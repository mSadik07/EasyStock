<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EasyStock | Yönetim Paneli</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background: #f0f2f5; height: 100vh; overflow: hidden; }
        /* SIDEBAR */
        .sidebar { width: 260px; background: #1a252f; color: white; padding: 25px; display: flex; flex-direction: column; }
        .sidebar h2 { margin-bottom: 35px; color: #3498db; text-align: center; }
        .menu-items { flex-grow: 1; }
        .menu-items p { padding: 12px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .menu-items p:hover { background: #34495e; color: #3498db; }
        .btn-backup { background: #f39c12; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .btn-logout { background: #e74c3c; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
        /* ANA İÇERİK */
        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-top: 5px solid #3498db; }
        .form-section, .table-section { background: white; padding: 25px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .critical { color: #e74c3c; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>📦 EasyStock</h2>
        <div class="menu-items">
            <p onclick="location.reload()">📊 Dashboard</p>
            <p onclick="window.location.href='profile.html'">👤 Profilim</p>
            <p onclick="alert('Yakında!')">📋 Raporlar</p>
            <button class="btn-backup" onclick="yedekle()">💾 JSON Yedek Al</button>
        </div>
        <button class="btn-logout" onclick="cikisYap()">🚪 Güvenli Çıkış</button>
    </div>

    <div class="main">
        <h1 id="welcomeText">Yükleniyor...</h1>
        <div class="card-grid">
            <div class="card"><h3>Ürün Çeşidi</h3><p id="totalCount">0</p></div>
            <div class="card" style="border-top-color:#e74c3c"><h3>Kritik Stok</h3><p id="criticalCount">0</p></div>
            <div class="card" style="border-top-color:#2ecc71"><h3>Kasa Değeri</h3><p id="totalValue">0 TL</p></div>
            <div class="card"><h3>Sistem</h3><p id="statusText">Aktif ✅</p></div>
        </div>

        <div class="form-section">
            <h3>Envantere Ürün Ekle</h3><br>
            <form id="productForm" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <input type="text" id="barcode" placeholder="Barkod" required>
                <input type="text" id="pName" placeholder="Ürün İsmi" required>
                <input type="text" id="pCat" placeholder="Kategori" required>
                <input type="number" id="pStock" placeholder="Stok Adedi" required>
                <input type="number" id="pBuy" placeholder="Alış Fiyatı" required>
                <input type="number" id="pSell" placeholder="Satış Fiyatı" required>
                <button type="submit" style="grid-column: span 3; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">Kaydet</button>
            </form>
        </div>

        <div class="table-section">
            <input type="text" id="search" placeholder="Ürün adı veya barkod ile ara..." onkeyup="verileriGetir()" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead><tr style="text-align: left; color: #7f8c8d;"><th>Barkod</th><th>Ürün</th><th>Stok</th><th>Fiyat</th><th>İşlemler</th></tr></thead>
                <tbody id="productTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API = "http://localhost:9000/api";
        
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { window.location.href = "login.html"; return; }
            document.getElementById('welcomeText').innerText = `Hoş geldin, ${user.name} 👋`;
            verileriGetir();
        };

        async function verileriGetir() {
            try {
                const dRes = await fetch(`${API}/system/dashboard`);
                const dData = await dRes.json();
                document.getElementById('totalCount').innerText = dData.dashboard.inventoryDiversity;
                document.getElementById('criticalCount').innerText = dData.dashboard.criticalAlerts;

                const vRes = await fetch(`${API}/analysis/inventory-value`);
                const vData = await vRes.json();
                document.getElementById('totalValue').innerText = vData.summary.potentialTotalRevenue.toLocaleString() + " TL";

                const pRes = await fetch(`${API}/products`);
                const pData = await pRes.json();
                const search = document.getElementById('search').value.toLowerCase();
                const table = document.getElementById('productTable');
                table.innerHTML = "";

                pData.products.forEach(p => {
                    if(p.name.toLowerCase().includes(search) || p.barcode.includes(search)) {
                        const isCritical = p.stockQuantity <= 5;
                        table.innerHTML += `
                            <tr>
                                <td><b>#${p.barcode}</b></td>
                                <td>${p.name}</td>
                                <td class="${isCritical ? 'critical' : ''}">${p.stockQuantity}</td>
                                <td>${p.sellPrice} TL</td>
                                <td>
                                    <button onclick="satisYap('${p.barcode}')" style="background:#2ecc71; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;">SAT</button>
                                    <button onclick="stokEkle('${p.barcode}')" style="background:#9b59b6; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;">EKLE</button>
                                    <button onclick="urunSil('${p.barcode}')" style="background:#e74c3c; color:white; border:none; padding:6px; border-radius:4px; cursor:pointer;">SİL</button>
                                </td>
                            </tr>`;
                    }
                });
            } catch(e) {}
        }

        async function urunSil(b) { if(confirm("Silinsin mi?")) { await fetch(`${API}/products/${b}`, {method:'DELETE'}); verileriGetir(); } }
        async function stokEkle(b) {
            const m = prompt("Eklenecek miktar:");
            if(!m) return;
            await fetch(`${API}/products/${b}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({stockQuantity: Number(m)})
            });
            verileriGetir();
        }
        async function satisYap(b) {
            const q = prompt("Kaç adet satıldı?");
            if(!q) return;
            const res = await fetch(`${API}/sales`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({barcode: b, quantity: Number(q)})
            });
            if(res.ok) verileriGetir(); else alert("Stok yetersiz!");
        }
        async function yedekle() {
            const res = await fetch(`${API}/system/backup`);
            const data = await res.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "EasyStock_Yedek.json";
            a.click();
        }
        function cikisYap() { if(confirm("Çıkış yapılsın mı?")) { localStorage.removeItem('user'); window.location.href="login.html"; } }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                barcode: document.getElementById('barcode').value,
                name: document.getElementById('pName').value,
                category: document.getElementById('pCat').value,
                stockQuantity: Number(document.getElementById('pStock').value),
                buyPrice: Number(document.getElementById('pBuy').value),
                sellPrice: Number(document.getElementById('pSell').value)
            };
            await fetch(`${API}/products`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById('productForm').reset();
            verileriGetir();
        });
    </script>
</body>
</html>
