<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyStock | Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #10b981; --danger: #ef4444; --sidebar: #0f172a; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; background: var(--bg); height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: var(--sidebar); color: white; padding: 30px; display: flex; flex-direction: column; flex-shrink: 0; }
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; border: 1px solid #e2e8f0; }
        .dashboard-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 25px; }
        .section { background: white; padding: 25px; border-radius: 24px; border: 1px solid #e2e8f0; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        input { padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; outline: none; background: #f8fafc; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 15px; background: #fff; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .btn-sm { padding: 6px 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: 700; font-size: 11px; }
        @media (max-width: 1000px) {
            .dashboard-layout { grid-template-columns: 1fr; }
            body { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; height: auto; padding: 20px; }
            .main { padding: 20px; }
            .form-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 650px) {
            .sidebar { padding: 16px; }
            .card-grid { grid-template-columns: 1fr; }
            .section { padding: 20px; }
            .form-grid { gap: 10px; }
            table, td { font-size: 13px; }
            td { padding: 12px; }
            .btn-sm { width: 100%; margin-bottom: 8px; }
            .btn-sm:last-child { margin-bottom: 0; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h2 style="margin-bottom:30px;">📦 Easy<span style="color:var(--primary)">Stock</span></h2>
        <nav style="flex-grow:1">
            <div class="active" style="padding:12px; color:white; font-weight:700; cursor:pointer;" onclick="location.reload()">📊 Dashboard</div>
            <div style="padding:12px; color:#94a3b8; cursor:pointer;" onclick="window.location.href='profile.html'">👤 Profilim</div>
            <div style="padding:12px; color:#94a3b8; cursor:pointer;" onclick="window.location.href='reports.html'">📋 Raporlar</div>
        </nav>
        <button onclick="yedekle()" style="background:white; padding:12px; border-radius:12px; border:none; font-weight:800; cursor:pointer;">💾 Yedek Al</button>
        <button onclick="cikisYap()" style="background:transparent; color:red; border:1px solid red; padding:10px; border-radius:12px; margin-top:10px; cursor:pointer;">Çıkış</button>
    </aside>

    <main class="main">
        <h1 id="welcomeText" style="margin-bottom:30px;">Hoş geldin!</h1>
        <div class="card-grid">
            <div class="card"><h3>Ürün Çeşidi</h3><p id="totalCount">0</p></div>
            <div class="card"><h3>Kritik Stok</h3><p id="criticalCount" style="color:red">0</p></div>
            <div class="card"><h3>Toplam Değer</h3><p id="totalValue">0 TL</p></div>
            <div class="card"><h3>Sistem</h3><p style="color:green">Aktif ✅</p></div>
        </div>

        <div class="dashboard-layout">
            <div class="section">
                <h3>Ürün Yönetimi</h3><br>
                <form id="productForm" class="form-grid">
                    <input type="text" id="barcode" placeholder="Barkod" required>
                    <input type="text" id="pName" placeholder="Ürün İsmi" required>
                    <input type="text" id="pCat" placeholder="Kategori" required>
                    <input type="number" id="pStock" placeholder="Stok" required>
                    <input type="number" id="pBuy" placeholder="Alış" required>
                    <input type="number" id="pSell" placeholder="Satış" required>
                    <button type="submit" style="grid-column: span 3; background:var(--primary); color:white; padding:12px; border-radius:12px; border:none; font-weight:800; cursor:pointer;">Kaydet</button>
                </form>
                <input type="text" id="search" placeholder="Tabloda ara..." onkeyup="verileriGetir()" style="width:100%; margin-bottom:15px;">
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr style="text-align:left; font-size:11px; color:#94a3b8;"><th>BARKOD</th><th>ÜRÜN</th><th>STOK</th><th>FİYAT</th><th>İŞLEM</th></tr></thead>
                        <tbody id="productTable"></tbody>
                    </table>
                </div>
            </div>
            <div class="section">
                <h3>Kategori Dağılımı</h3>
                <div style="height:300px;"><canvas id="categoryChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        const API = "https://easy-stock-five.vercel.app/api";
        let catChart = null;

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('user'));
            if(user) document.getElementById('welcomeText').innerText = `Hoş geldin, ${user.name} 👋`;
            verileriGetir();
        };

        async function verileriGetir() {
            try {
                const [dRes, vRes, pRes] = await Promise.all([
                    fetch(`${API}/system/dashboard`),
                    fetch(`${API}/analysis/inventory-value`),
                    fetch(`${API}/products`)
                ]);
                const dData = await dRes.json();
                const vData = await vRes.json();
                const pData = await pRes.json();

                document.getElementById('totalCount').innerText = dData.dashboard.inventoryDiversity;
                document.getElementById('criticalCount').innerText = dData.dashboard.criticalAlerts;
                document.getElementById('totalValue').innerText = vData.summary.potentialTotalRevenue.toLocaleString() + " TL";

                const search = document.getElementById('search').value.toLowerCase();
                const table = document.getElementById('productTable');
                table.innerHTML = "";
                const counts = {};

                pData.products.forEach(p => {
                    counts[p.category] = (counts[p.category] || 0) + 1;
                    if(p.name.toLowerCase().includes(search) || p.barcode.includes(search)) {
                        table.innerHTML += `<tr>
                            <td style="color:#94a3b8; font-size:11px;">#${p.barcode}</td>
                            <td><b>${p.name}</b></td>
                            <td style="${p.stockQuantity<=5?'color:red;font-weight:800':''}">${p.stockQuantity}</td>
                            <td>${p.sellPrice} TL</td>
                            <td>
                                <button class="btn-sm" style="background:#dcfce7; color:#166534;" onclick="satisYap('${p.barcode}')">SAT</button>
                                <button class="btn-sm" style="background:#e0e7ff; color:#3730a3;" onclick="stokEkle('${p.barcode}')">+</button>
                                <button class="btn-sm" style="background:#fee2e2; color:#991b1b;" onclick="urunSil('${p.barcode}')">X</button>
                            </td>
                        </tr>`;
                    }
                });
                updateChart(counts);
            } catch(e) {}
        }

        function updateChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            if(catChart) catChart.destroy();
            catChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: Object.keys(data), datasets: [{ data: Object.values(data), backgroundColor: ['#6366f1','#10b981','#f59e0b','#ef4444'], cutout:'70%' }] },
                options: { maintainAspectRatio: false }
            });
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                barcode: document.getElementById('barcode').value,
                name: document.getElementById('pName').value,
                category: document.getElementById('pCat').value,
                stockQuantity: Number(document.getElementById('pStock').value),
                buyPrice: Number(document.getElementById('pBuy').value),
                sellPrice: Number(document.getElementById('pSell').value)
            };
            await fetch(`${API}/products`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById('productForm').reset(); verileriGetir();
        });

        async function satisYap(b) {
            const { value: q } = await Swal.fire({ title: 'Adet', input: 'number', inputValue: 1 });
            if(q) { await fetch(`${API}/sales`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({barcode:b, quantity:Number(q)}) }); verileriGetir(); }
        }

        async function stokEkle(b) {
            const { value: q } = await Swal.fire({ title: 'Eklenecek Stok', input: 'number', inputValue: 10 });
            if(q) { await fetch(`${API}/products/${b}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({stockQuantity:Number(q)}) }); verileriGetir(); }
        }

        async function urunSil(b) {
            const res = await Swal.fire({ title: 'Silinsin mi?', showCancelButton: true });
            if(res.isConfirmed) { await fetch(`${API}/products/${b}`, { method: 'DELETE' }); verileriGetir(); }
        }

        async function yedekle() {
            const res = await fetch(`${API}/system/backup`);
            const data = await res.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "Yedek.json"; a.click();
        }

        function cikisYap() { localStorage.removeItem('user'); window.location.href="login.html"; }
    </script>
</body>
</html>
