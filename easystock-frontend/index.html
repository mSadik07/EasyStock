<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyStock | Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #ef233c;
            --warning: #f8961e;
            --bg: #f8f9fa;
            --sidebar-bg: #1e1e2d;
            --text-main: #2b2d42;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { display: flex; background: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar-bg); color: #fff; padding: 30px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 24px; font-weight: 700; color: var(--success); margin-bottom: 30px; text-align: center; }
        
        .menu-items { flex-grow: 1; }
        .menu-link { 
            padding: 14px 18px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; 
            transition: 0.3s; display: flex; align-items: center; gap: 12px; color: #a2a3b7; text-decoration: none;
        }
        .menu-link:hover, .menu-link.active { background: rgba(255,255,255,0.05); color: #fff; }
        .menu-link.active { border-left: 4px solid var(--primary); background: rgba(67, 97, 238, 0.1); }

        .btn-backup { background: var(--warning); color: #fff; border: none; padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; margin-bottom: 12px; font-weight: 600; }
        .btn-logout { background: rgba(239, 35, 60, 0.1); color: var(--danger); border: 1px solid var(--danger); padding: 12px; width: 100%; border-radius: 12px; cursor: pointer; font-weight: 600; }

        /* ANA İÇERİK */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

        /* KARTLAR */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .card { background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #edf2f7; }
        .card h3 { color: #718096; font-size: 13px; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 24px; font-weight: 700; }

        /* FORM & TABLO */
        .section { background: #fff; padding: 30px; border-radius: 24px; margin-bottom: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; background: #f8fafc; }
        .btn-primary { background: var(--primary); color: #fff; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: 700; grid-column: span 3; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { padding: 15px; color: #a0aec0; font-size: 12px; text-transform: uppercase; text-align: left; }
        td { padding: 15px; background: #fff; border-top: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .critical-badge { background: var(--danger); color: #fff; padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2>📦 EasyStock</h2>
        <nav class="menu-items">
            <div class="menu-link active" onclick="location.reload()">📊 Dashboard</div>
            <div class="menu-link" onclick="window.location.href='profile.html'">👤 Profilim</div>
            <div class="menu-link" onclick="window.location.href='reports.html'">📋 Satış Raporları</div>
        </nav>
        <button class="btn-backup" onclick="yedekle()">💾 Veri Yedeği Al</button>
        <button class="btn-logout" onclick="cikisYap()">Çıkış Yap</button>
    </aside>

    <main class="main">
        <h1 id="welcomeText">Yükleniyor...</h1>
        
        <div class="card-grid">
            <div class="card"><h3>Ürün Çeşitliliği</h3><p id="totalCount">0</p></div>
            <div class="card"><h3>Kritik Stok</h3><p id="criticalCount" style="color:var(--danger)">0</p></div>
            <div class="card"><h3>Kasa Değeri</h3><p id="totalValue">0 TL</p></div>
            <div class="card"><h3>Sistem</h3><p id="statusText" style="color:var(--success)">Aktif ✅</p></div>
        </div>

        <section class="section">
            <h2 style="margin-bottom:20px">Yeni Ürün Kaydı</h2>
            <form id="productForm" class="form-grid">
                <input type="text" id="barcode" placeholder="Barkod" required>
                <input type="text" id="pName" placeholder="Ürün İsmi" required>
                <input type="text" id="pCat" placeholder="Kategori" required>
                <input type="number" id="pStock" placeholder="Stok" required>
                <input type="number" id="pBuy" placeholder="Alış" required>
                <input type="number" id="pSell" placeholder="Satış" required>
                <button type="submit" class="btn-primary">Envantere Ekle</button>
            </form>
        </section>

        <section class="section">
            <input type="text" id="search" placeholder="Ürün ara..." onkeyup="verileriGetir()" style="width: 100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px;">
            <table>
                <thead>
                    <tr><th>Barkod</th><th>Ürün</th><th>Stok</th><th>Fiyat</th><th>İşlemler</th></tr>
                </thead>
                <tbody id="productTable"></tbody>
            </table>
        </section>
    </main>

    <script>
        const API = "http://localhost:9000/api";
        
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { window.location.href = "login.html"; return; }
            document.getElementById('welcomeText').innerText = `Hoş geldin, ${user.name} 👋`;
            verileriGetir();
        };

        async function verileriGetir() {
            try {
                const [dRes, vRes, pRes] = await Promise.all([
                    fetch(`${API}/system/dashboard`),
                    fetch(`${API}/analysis/inventory-value`),
                    fetch(`${API}/products`)
                ]);
                const dData = await dRes.json();
                const vData = await vRes.json();
                const pData = await pRes.json();

                document.getElementById('totalCount').innerText = dData.dashboard.inventoryDiversity;
                document.getElementById('criticalCount').innerText = dData.dashboard.criticalAlerts;
                document.getElementById('totalValue').innerText = vData.summary.potentialTotalRevenue.toLocaleString() + " TL";

                const search = document.getElementById('search').value.toLowerCase();
                const table = document.getElementById('productTable');
                table.innerHTML = "";

                pData.products.forEach(p => {
                    if(p.name.toLowerCase().includes(search)) {
                        const isCritical = p.stockQuantity <= 5;
                        table.innerHTML += `
                            <tr>
                                <td>#${p.barcode}</td>
                                <td><b>${p.name}</b></td>
                                <td>${p.stockQuantity} ${isCritical ? '<span class="critical-badge">KRİTİK</span>' : ''}</td>
                                <td>${p.sellPrice} TL</td>
                                <td>
                                    <button onclick="satisYap('${p.barcode}')" style="background:#2ecc71; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer">SAT</button>
                                    <button onclick="stokEkle('${p.barcode}')" style="background:#3498db; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer">EKLE</button>
                                    <button onclick="urunSil('${p.barcode}')" style="background:#e74c3c; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer">SİL</button>
                                </td>
                            </tr>`;
                    }
                });
            } catch(e) {}
        }

        async function urunSil(b) { if(confirm("Silinsin mi?")) { await fetch(`${API}/products/${b}`, {method:'DELETE'}); verileriGetir(); } }
        async function stokEkle(b) {
            const m = prompt("Eklenecek miktar:");
            if(!m) return;
            await fetch(`${API}/products/${b}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({stockQuantity: Number(m)})
            });
            verileriGetir();
        }
        async function satisYap(b) {
            const q = prompt("Kaç adet satıldı?");
            if(!q) return;
            const res = await fetch(`${API}/sales`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({barcode: b, quantity: Number(q)})
            });
            if(res.ok) verileriGetir(); else alert("Stok yetersiz!");
        }
        async function yedekle() {
            const res = await fetch(`${API}/system/backup`);
            const data = await res.json();
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "EasyStock_Yedek.json";
            a.click();
        }
        function cikisYap() { if(confirm("Çıkış yapılsın mı?")) { localStorage.removeItem('user'); window.location.href="login.html"; } }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                barcode: document.getElementById('barcode').value,
                name: document.getElementById('pName').value,
                category: document.getElementById('pCat').value,
                stockQuantity: Number(document.getElementById('pStock').value),
                buyPrice: Number(document.getElementById('pBuy').value),
                sellPrice: Number(document.getElementById('pSell').value)
            };
            await fetch(`${API}/products`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
            document.getElementById('productForm').reset();
            verileriGetir();
        });
    </script>
</body>
</html>
