version: '3.8'

services:
  mongo-mobile:
    image: mongo:6
    container_name: easystock-mongo-mobile
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo_mobile_data:/data/db
    networks:
      - easystock-mobile-net

  rabbitmq-mobile:
    image: rabbitmq:3-management
    container_name: easystock-rabbitmq-mobile
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - easystock-mobile-net

  redis-mobile:
    image: redis:7-alpine
    container_name: easystock-redis-mobile
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - easystock-mobile-net

  mobile-backend:
    build: ./mobile-backend
    container_name: easystock-mobile-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo-mobile:27017/easystock
      - JWT_SECRET=easystock_super_secret_key_2024
      - RABBITMQ_URI=amqp://rabbitmq-mobile:5672
      - REDIS_URI=redis://redis-mobile:6379
    depends_on:
      - mongo-mobile
      - rabbitmq-mobile
      - redis-mobile
    networks:
      - easystock-mobile-net

  mobile-frontend:
    build: ./mobile-frontend
    container_name: easystock-mobile-frontend
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - mobile-backend
    networks:
      - easystock-mobile-net

volumes:
  mongo_mobile_data:

networks:
  easystock-mobile-net:
    driver: bridge